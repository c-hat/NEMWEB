name: live-data

# Publishes today's live NEM demand + rooftop PV as a single JSON file on the
# force-pushed `live-data` branch, which the frontend reads over
# raw.githubusercontent.com (same trust domain as the rest of the site, so it
# isn't blocked by corporate firewalls the way a third-party origin can be).
# Replaces the Cloudflare Worker proxy.
#
# Manual-only for now (workflow_dispatch). The cron schedule is added once this
# path is confirmed working end-to-end. The OE API key is the repo secret
# OE_API_KEY (Settings -> Secrets and variables -> Actions).
on:
  workflow_dispatch:
    inputs:
      force_rooftop:
        description: "Fetch rooftop regardless of the minute-of-hour gate (for testing)."
        type: boolean
        default: false

# Overlapping runs would fight over the force-pushed branch; keep only the newest.
concurrency:
  group: live-data
  cancel-in-progress: true

# Needed to force-push the live-data branch.
permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Load previous live file (for rooftop carry-forward)
        run: |
          set -euo pipefail
          if git fetch --depth=1 origin live-data 2>/dev/null; then
            if git show FETCH_HEAD:today-live.json > prev-live.json 2>/dev/null; then
              echo "loaded previous today-live.json"
            else
              rm -f prev-live.json
              echo "live-data branch has no today-live.json yet"
            fi
          else
            echo "no live-data branch yet; starting fresh"
          fi

      - name: Fetch live data from OpenElectricity
        env:
          OE_API_KEY: ${{ secrets.OE_API_KEY }}
        run: |
          set -euo pipefail
          ARGS=(--out today-live.json --verbose)
          if [ -f prev-live.json ]; then ARGS+=(--prev prev-live.json); fi
          if [ "${{ inputs.force_rooftop }}" = "true" ]; then ARGS+=(--force-rooftop); fi
          uv run scripts/fetch_live.py "${ARGS[@]}"

      - name: Publish to the live-data orphan branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Build a single-file root (orphan) commit with git plumbing and
          # force-push it, so live-data always holds exactly this one file with
          # no accumulating history. The working tree (main's checkout) is
          # untouched.
          updated_at="$(python3 -c "import json;print(json.load(open('today-live.json'))['updatedAt'])")"
          blob="$(git hash-object -w today-live.json)"
          tree="$(printf '100644 blob %s\ttoday-live.json\n' "$blob" | git mktree)"
          commit="$(git commit-tree "$tree" -m "live: ${updated_at}")"
          git push -f origin "${commit}:refs/heads/live-data"
          echo "published today-live.json to live-data (updatedAt=${updated_at})"
