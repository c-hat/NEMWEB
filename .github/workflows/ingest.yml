name: ingest

# Real-world ingestion: fetch live AEMO NEMWEB data and commit the resulting
# JSON to public/data/. Runs the live fetch on a GitHub-hosted runner and
# commits the day's JSON so the static frontend has real data to render.
#
# Runs automatically every day at 03:00 AEST, and can also be triggered
# manually from the Actions tab (workflow_dispatch). It uses the live NEMWEB
# site by default (no --source, so NEMWEB_SOURCE/default applies).
on:
  schedule:
    # 03:00 AEST (UTC+10) daily = 17:00 UTC the previous day. By then the
    # previous trading day's actuals are published. With no inputs, the build
    # step defaults to "yesterday" (AEST) — see the Build ingest command step.
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Trading day D (YYYY-MM-DD, AEST). Default: yesterday (AEST)."
        required: false
        type: string
      backfill:
        description: "Ingest the last N days instead of a single date (overrides date)."
        required: false
        type: string

# Needed to commit the generated JSON back to the branch.
permissions:
  contents: write

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Sync dependencies
        working-directory: ingest
        run: uv sync

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Build ingest command
        id: cmd
        env:
          INPUT_BACKFILL: ${{ inputs.backfill }}
          INPUT_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_BACKFILL:-}" ]; then
            if ! [[ "$INPUT_BACKFILL" =~ ^[0-9]+$ ]]; then
              echo "Invalid backfill value: $INPUT_BACKFILL" >&2
              exit 1
            fi
            echo "args=--backfill $INPUT_BACKFILL" >> "$GITHUB_OUTPUT"
          else
            DATE="${INPUT_DATE:-}"
            if [ -z "$DATE" ]; then
              # Australia/Brisbane is AEST year-round (no DST), matching AEMO.
              DATE="$(TZ=Australia/Brisbane date -d 'yesterday' +%Y-%m-%d)"
            fi
            if ! [[ "$DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "Invalid date value: $DATE" >&2
              exit 1
            fi
            echo "args=--date $DATE" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ingest against live NEMWEB
        working-directory: ingest
        # --today also writes today.json: the forecast plume for the in-progress
        # trading day (today, AEST). At the 03:00 AEST run the D-1 16:00 forecast
        # for today is already published, so today.json is ready for the live
        # overlay before visitors arrive. Live actuals are layered in client-side
        # from the Cloudflare Worker, not baked into the file.
        run: |
          uv run python ingest.py ${{ steps.cmd.outputs.args }} --today \
            --out ../public/data --verbose

      - name: Commit data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: ingest ${{ steps.cmd.outputs.args }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Publish generated data to Cloudflare R2 and D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEMWEB_D1_DATABASE_NAME: ${{ vars.NEMWEB_D1_DATABASE_NAME }}
          NEMWEB_PUBLISH_D1: ${{ vars.NEMWEB_PUBLISH_D1 }}
          NEMWEB_R2_BUCKET: ${{ vars.NEMWEB_R2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${NEMWEB_R2_BUCKET:-}" ]; then
            echo "Cloudflare publish skipped: set CLOUDFLARE_API_TOKEN secret and NEMWEB_R2_BUCKET variable."
            exit 0
          fi
          publish_args=(--bucket "$NEMWEB_R2_BUCKET")
          if [ "${NEMWEB_PUBLISH_D1:-}" = "true" ]; then
            if [ -z "${NEMWEB_D1_DATABASE_NAME:-}" ]; then
              echo "Cloudflare D1 publish requested but NEMWEB_D1_DATABASE_NAME is not set."
              exit 1
            fi
            publish_args+=(--database "$NEMWEB_D1_DATABASE_NAME")
          else
            publish_args+=(--skip-d1)
          fi
          python3 scripts/publish_cloudflare.py "${publish_args[@]}"
