# Cloudflare Worker config for nemweb-live-pinger.
#
# A cron-only Worker: every ~10 min it POSTs the live-data GitHub workflow's
# dispatch endpoint (see src/index.ts and README.md). Deploy via the
# deploy-worker GitHub Action (on push to worker/**) or `npm run deploy` here.
name = "nemweb-live-pinger"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Fire every 10 minutes (UTC). The handler gates to the AEST active window, so
# overnight invocations no-op. CF cron triggers are reliable, unlike GitHub's.
[triggers]
crons = ["*/10 * * * *"]

[[r2_buckets]]
binding = "NEMWEB_BUCKET"
bucket_name = "nemweb-data-prod"

[[d1_databases]]
binding = "NEMWEB_DB"
database_name = "nemweb-catalog-prod"
database_id = "cb7b05b5-64fb-4fad-94dc-f0566f480a36"
migrations_dir = "migrations"

[vars]
DATA_FALLBACK_BASE_URL = "https://raw.githubusercontent.com/c-hat/NEMWEB/main/public"
LIVE_DATA_URL = "https://raw.githubusercontent.com/c-hat/NEMWEB/live-data/today-live.json"
ALLOWED_ORIGIN = "https://nemweb.pages.dev"

[observability.logs]
enabled = true

[env.preview]
name = "nemweb-live-pinger-preview"

[env.preview.triggers]
crons = []

[[env.preview.r2_buckets]]
binding = "NEMWEB_BUCKET"
bucket_name = "nemweb-data-prod"

[[env.preview.d1_databases]]
binding = "NEMWEB_DB"
database_name = "nemweb-catalog-prod"
database_id = "cb7b05b5-64fb-4fad-94dc-f0566f480a36"
migrations_dir = "migrations"

[env.preview.vars]
DATA_FALLBACK_BASE_URL = "https://raw.githubusercontent.com/c-hat/NEMWEB/main/public"
LIVE_DATA_URL = "https://raw.githubusercontent.com/c-hat/NEMWEB/live-data/today-live.json"
ALLOWED_ORIGIN = "*"
WORKFLOW_REF = "architecture-docs"

# GH_DISPATCH_TOKEN is a SECRET (a fine-grained GitHub PAT with Actions: Read
# and write on c-hat/NEMWEB) and must NOT live here. Set it once on the Worker:
#   npx wrangler secret put GH_DISPATCH_TOKEN
# (or add it as an encrypted Variable in the Cloudflare dashboard).
